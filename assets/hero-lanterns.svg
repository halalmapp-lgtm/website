<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="glowWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6C65C" stop-opacity="0"/>
      <stop offset="55%" stop-color="#D4AF37" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#CC5500" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="glassWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6C65C" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#FFBF00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#CC5500" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="bokeh" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <symbol id="fanous" viewBox="0 0 56 132">
      <!-- chain -->
      <path d="M28 0v10" stroke="#E6C65C" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
      <!-- dome cap + filigree -->
      <path d="M28 10c-6 0-10 4-10 8v3h20v-3c0-4-4-8-10-8z" fill="#D4AF37" fill-opacity="0.14" stroke="#E6C65C" stroke-width="0.9" stroke-opacity="0.65"/>
      <path d="M20 14h16M22 17h12" stroke="#E6C65C" stroke-width="0.55" stroke-opacity="0.45" stroke-linecap="round"/>
      <!-- upper lattice band -->
      <path d="M16 21h24l-2 5H18l-2-5z" fill="#D4AF37" fill-opacity="0.1" stroke="#E6C65C" stroke-width="0.75" stroke-opacity="0.55"/>
      <circle cx="22" cy="23.5" r="0.9" fill="#E6C65C" fill-opacity="0.35"/>
      <circle cx="28" cy="23.5" r="0.9" fill="#E6C65C" fill-opacity="0.35"/>
      <circle cx="34" cy="23.5" r="0.9" fill="#E6C65C" fill-opacity="0.35"/>
      <!-- main body -->
      <path d="M14 26h28l3 38c0 8-7 16-17 22-10-6-17-14-17-22l3-38z" fill="#D4AF37" fill-opacity="0.12" stroke="#E6C65C" stroke-width="0.95" stroke-opacity="0.62"/>
      <!-- arched windows -->
      <path d="M19 34h6v18a3 3 0 0 1-6 0V34z" fill="url(#glassWarm)" stroke="#E6C65C" stroke-width="0.55" stroke-opacity="0.5"/>
      <path d="M25 32h6v20a3 3 0 0 1-6 0V32z" fill="url(#glassWarm)" stroke="#E6C65C" stroke-width="0.55" stroke-opacity="0.5"/>
      <path d="M31 34h6v18a3 3 0 0 1-6 0V34z" fill="url(#glassWarm)" stroke="#E6C65C" stroke-width="0.55" stroke-opacity="0.5"/>
      <!-- star hint in center panel -->
      <path d="M28 38l1.2 2.4 2.6.4-1.9 1.8.5 2.6-2.4-1.3-2.4 1.3.5-2.6-1.9-1.8 2.6-.4z" fill="#FFBF00" fill-opacity="0.35"/>
      <!-- lower lattice -->
      <path d="M18 68h20l-1.5 4H19.5l-1.5-4z" fill="#D4AF37" fill-opacity="0.08" stroke="#E6C65C" stroke-width="0.65" stroke-opacity="0.45"/>
      <!-- tapered base -->
      <path d="M20 72h16l2 14-10 8-10-8 2-14z" fill="#D4AF37" fill-opacity="0.1" stroke="#E6C65C" stroke-width="0.85" stroke-opacity="0.55"/>
      <path d="M24 78h8v8l-4 3-4-3v-8z" stroke="#E6C65C" stroke-width="0.5" stroke-opacity="0.4"/>
      <!-- teardrop finial -->
      <path d="M28 94c-2 6-4 10-4 16 0-6-2-10-4-16" stroke="#E6C65C" stroke-width="0.85" stroke-opacity="0.5" fill="#D4AF37" fill-opacity="0.1"/>
      <ellipse cx="28" cy="118" rx="2.2" ry="3.2" fill="#E6C65C" fill-opacity="0.35"/>
    </symbol>
  </defs>

  <!-- soft warm light spill (Moroccan lantern glow) -->
  <ellipse cx="600" cy="155" rx="220" ry="42" fill="url(#glowWarm)" filter="url(#bokeh)" opacity="0.85"/>
  <ellipse cx="420" cy="130" rx="70" ry="22" fill="#FFBF00" fill-opacity="0.06" filter="url(#bokeh)"/>
  <ellipse cx="780" cy="130" rx="70" ry="22" fill="#FFBF00" fill-opacity="0.06" filter="url(#bokeh)"/>

  <!-- scalloped arch frieze -->
  <path d="M0 0h1200v26c0 0-40-18-100-10s-100 22-200 10-100-22-200-10-100 22-200 10-100-22-200-10-100 22-200 10S40 8 0 26V0z"
        fill="#D4AF37" fill-opacity="0.07" stroke="#E6C65C" stroke-opacity="0.18" stroke-width="0.8"/>
  <path d="M0 18 Q150 2 300 18 T600 18 T900 18 T1200 18" stroke="#E6C65C" stroke-opacity="0.14" stroke-width="0.6" fill="none"/>
  <!-- arabesque dots along arch -->
  <g fill="#E6C65C" fill-opacity="0.2">
    <circle cx="150" cy="14" r="2"/><circle cx="300" cy="14" r="2.5"/><circle cx="450" cy="14" r="2"/>
    <circle cx="600" cy="14" r="3"/><circle cx="750" cy="14" r="2"/><circle cx="900" cy="14" r="2.5"/><circle cx="1050" cy="14" r="2"/>
  </g>

  <!-- 7 lanterns  V formation, largest center -->
  <g class="lantern-row">
    <use href="#fanous" x="62"  y="34" width="38" height="89"/>
    <use href="#fanous" x="218" y="28" width="46" height="108"/>
    <use href="#fanous" x="388" y="24" width="52" height="122"/>
    <use href="#fanous" x="572" y="18" width="56" height="132"/>
    <use href="#fanous" x="760" y="24" width="52" height="122"/>
    <use href="#fanous" x="936" y="28" width="46" height="108"/>
    <use href="#fanous" x="1100" y="34" width="38" height="89"/>
  </g>
</svg>
